<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Cover 10 — Git History / Fork</title>
<style>
  body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
</style>
</head><body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" width="600" height="900">
  <rect width="600" height="900" fill="#1a1a2e"/>

  <!-- Git commit graph — single line of commits, then branching -->
  <g font-family="'JetBrains Mono', monospace">

    <!-- Main branch — past commits -->
    <circle cx="200" cy="240" r="4" fill="#d4a574" opacity="0.3"/>
    <line x1="200" y1="244" x2="200" y2="290" stroke="#d4a574" stroke-width="1" opacity="0.3"/>
    <text x="215" y="244" font-size="8" fill="#6a6a8a" opacity="0.2">1924 first measurement</text>

    <circle cx="200" cy="295" r="4" fill="#d4a574" opacity="0.35"/>
    <line x1="200" y1="299" x2="200" y2="345" stroke="#d4a574" stroke-width="1" opacity="0.35"/>
    <text x="215" y="299" font-size="8" fill="#6a6a8a" opacity="0.25">1929 alpha waves published</text>

    <circle cx="200" cy="350" r="4" fill="#d4a574" opacity="0.4"/>
    <line x1="200" y1="354" x2="200" y2="400" stroke="#d4a574" stroke-width="1" opacity="0.4"/>
    <text x="215" y="354" font-size="8" fill="#6a6a8a" opacity="0.3">2021 first BCI trials</text>

    <circle cx="200" cy="405" r="4" fill="#d4a574" opacity="0.5"/>
    <line x1="200" y1="409" x2="200" y2="455" stroke="#d4a574" stroke-width="1" opacity="0.5"/>
    <text x="215" y="409" font-size="8" fill="#6a6a8a" opacity="0.35">2031 CortexLink MK-I</text>

    <circle cx="200" cy="460" r="4" fill="#d4a574" opacity="0.6"/>
    <line x1="200" y1="464" x2="200" y2="510" stroke="#d4a574" stroke-width="1" opacity="0.6"/>
    <text x="215" y="464" font-size="8" fill="#6a6a8a" opacity="0.4">2035 100M patches</text>

    <!-- THE FORK — 2041 -->
    <circle cx="200" cy="515" r="6" fill="#d4a574" opacity="0.8"/>
    <text x="215" y="519" font-size="9" fill="#d4a574" opacity="0.7">2041 — checkpoint</text>

    <!-- Branch A: right — optimize further -->
    <path d="M 200,521 C 220,540 260,560 300,580" fill="none" stroke="#d4a574" stroke-width="1" opacity="0.4"/>
    <circle cx="300" cy="580" r="3" fill="#d4a574" opacity="0.35"/>
    <text x="312" y="584" font-size="7" fill="#d4a574" opacity="0.3">MK-VI</text>

    <path d="M 300,583 C 320,600 360,620 400,640" fill="none" stroke="#d4a574" stroke-width="0.8" opacity="0.25"/>
    <circle cx="400" cy="640" r="2.5" fill="#d4a574" opacity="0.2"/>
    <text x="412" y="644" font-size="7" fill="#d4a574" opacity="0.15">MK-VII</text>

    <path d="M 400,643 C 420,660 450,680 480,700" fill="none" stroke="#d4a574" stroke-width="0.5" opacity="0.12"/>
    <circle cx="480" cy="700" r="2" fill="#d4a574" opacity="0.1"/>

    <path d="M 480,703 C 490,720 500,740 505,760" fill="none" stroke="#d4a574" stroke-width="0.3" opacity="0.06" stroke-dasharray="3,4"/>

    <!-- Branch B: left — resist -->
    <path d="M 200,521 C 180,540 140,560 100,580" fill="none" stroke="#7ec8a0" stroke-width="1" opacity="0.4"/>
    <circle cx="100" cy="580" r="3" fill="#7ec8a0" opacity="0.35"/>
    <text x="60" y="584" font-size="7" fill="#7ec8a0" opacity="0.3">unplug</text>

    <path d="M 100,583 C 90,600 85,620 90,650" fill="none" stroke="#7ec8a0" stroke-width="0.8" opacity="0.3"/>
    <circle cx="90" cy="650" r="3" fill="#7ec8a0" opacity="0.3"/>
    <text x="50" y="654" font-size="7" fill="#7ec8a0" opacity="0.25">rebuild</text>

    <path d="M 90,653 C 95,670 100,690 100,720" fill="none" stroke="#7ec8a0" stroke-width="0.8" opacity="0.25"/>
    <circle cx="100" cy="720" r="3" fill="#7ec8a0" opacity="0.25"/>

    <!-- Branch C: center — try to merge -->
    <line x1="200" y1="521" x2="200" y2="580" stroke="#7aa2d4" stroke-width="0.8" opacity="0.3"/>
    <circle cx="200" cy="580" r="3" fill="#7aa2d4" opacity="0.25"/>
    <text x="210" y="584" font-size="7" fill="#7aa2d4" opacity="0.2">merge?</text>

    <line x1="200" y1="583" x2="200" y2="640" stroke="#7aa2d4" stroke-width="0.5" opacity="0.15" stroke-dasharray="3,5"/>
    <text x="205" y="650" font-size="7" fill="#7aa2d4" opacity="0.1">conflict</text>

    <!-- no commit history annotation -->
    <text x="200" y="770" font-size="8" fill="#6a6a8a" text-anchor="middle" opacity="0.2">fatal: no rollback available</text>
    <text x="200" y="785" font-size="8" fill="#6a6a8a" text-anchor="middle" opacity="0.15">deployed to production (900M brains)</text>
  </g>

  <!-- Title -->
  <text x="300" y="100" font-family="'JetBrains Mono', monospace" font-size="48" font-weight="700" fill="#d4a574" text-anchor="middle" letter-spacing="6">CHECKPOINT</text>
  <text x="300" y="135" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6a6a8a" text-anchor="middle">How we optimized into the void.</text>

  <text x="300" y="860" font-family="'JetBrains Mono', monospace" font-size="14" fill="#c4c4d4" text-anchor="middle">R.F. &amp; Claude</text>
</svg>
</body></html>
