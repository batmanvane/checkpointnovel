<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Cover 5 — Minimal Patch</title>
<style>
  body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
</style>
</head><body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" width="600" height="900">
  <defs>
    <radialGradient id="patch-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4a574" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#d4a574" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#d4a574" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="patch-inner" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4a574" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#d4a574" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d4a574" stop-opacity="0.1"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="900" fill="#1a1a2e"/>

  <!-- Ambient glow behind the patch -->
  <circle cx="300" cy="420" r="200" fill="url(#patch-glow)"/>

  <!-- The patch — a small circle, the BCI device -->
  <circle cx="300" cy="420" r="24" fill="none" stroke="#d4a574" stroke-width="1" opacity="0.4"/>
  <circle cx="300" cy="420" r="16" fill="none" stroke="#d4a574" stroke-width="0.5" opacity="0.3"/>
  <circle cx="300" cy="420" r="4" fill="#d4a574" opacity="0.6"/>

  <!-- Concentric rings — signal propagation -->
  <circle cx="300" cy="420" r="50" fill="none" stroke="#d4a574" stroke-width="0.5" opacity="0.15"/>
  <circle cx="300" cy="420" r="80" fill="none" stroke="#d4a574" stroke-width="0.5" opacity="0.1"/>
  <circle cx="300" cy="420" r="120" fill="none" stroke="#d4a574" stroke-width="0.5" opacity="0.06"/>
  <circle cx="300" cy="420" r="170" fill="none" stroke="#d4a574" stroke-width="0.5" opacity="0.03"/>

  <!-- Tiny data fragments orbiting -->
  <g font-family="'JetBrains Mono', monospace" font-size="7" fill="#d4a574">
    <text x="330" y="398" opacity="0.2">read</text>
    <text x="258" y="445" opacity="0.15">write</text>
    <text x="340" y="450" opacity="0.12">optimize</text>
    <text x="245" y="395" opacity="0.1">reward</text>
    <text x="310" y="475" opacity="0.08">deploy</text>
    <text x="255" y="370" opacity="0.07">learn</text>
    <text x="350" y="420" opacity="0.06">align</text>
  </g>

  <!-- 900M counter -->
  <text x="300" y="530" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6a6a8a" text-anchor="middle" opacity="0.3">900,000,000 connected</text>

  <!-- Title -->
  <text x="300" y="160" font-family="'JetBrains Mono', monospace" font-size="48" font-weight="700" fill="#d4a574" text-anchor="middle" letter-spacing="6">CHECKPOINT</text>

  <!-- Subtitle -->
  <text x="300" y="195" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6a6a8a" text-anchor="middle">How we optimized into the void.</text>

  <!-- Bottom question -->
  <text x="300" y="740" font-family="'JetBrains Mono', monospace" font-size="11" fill="#6a6a8a" text-anchor="middle" opacity="0.5">where does the patch stop and the you begin?</text>

  <!-- Author -->
  <text x="300" y="830" font-family="'JetBrains Mono', monospace" font-size="14" fill="#c4c4d4" text-anchor="middle">R.F. &amp; Claude</text>
</svg>
</body></html>
