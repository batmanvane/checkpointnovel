<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Cover 11 — Convergence</title>
<style>
  body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
</style>
<script>
window.onload = function() {
  const g = document.getElementById('lines');
  const numLines = 40;
  const startY = 240;
  const endY = 680;
  const steps = 200;

  for (let i = 0; i < numLines; i++) {
    // Each line starts at a different x position (spread across width)
    const startX = 60 + (i / numLines) * 480;

    // All converge toward center (300), but with some noise
    const points = [];
    let x = startX;
    for (let s = 0; s <= steps; s++) {
      const t = s / steps;
      const y = startY + t * (endY - startY);

      // Pull toward center, stronger as t increases
      const target = 300;
      const pull = t * t * t; // cubic easing — slow start, strong end
      x = startX + (target - startX) * pull;

      // Add diminishing noise
      const noise = (Math.random() - 0.5) * 20 * (1 - t);
      x += noise;

      points.push([x, y]);
    }

    // Draw as polyline
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
    const ptStr = points.map(p => `${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
    path.setAttribute('points', ptStr);
    path.setAttribute('fill', 'none');

    // Color: outer lines are different colors, converging to same
    const hue = (startX / 600) * 40 + 20; // 20-60 range (gold spectrum)
    const opacity = 0.15 + Math.random() * 0.15;
    path.setAttribute('stroke', `hsl(${hue}, 50%, 60%)`);
    path.setAttribute('stroke-width', '0.5');
    path.setAttribute('opacity', opacity.toFixed(2));
    g.appendChild(path);
  }

  // Add a few "identity" labels at the top, spreading
  const identities = ['henning', 'maya', 'lin wei', 'amara', 'tomas', 'sara'];
  const positions = [100, 180, 260, 340, 420, 500];
  identities.forEach((name, idx) => {
    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    txt.setAttribute('x', positions[idx]);
    txt.setAttribute('y', startY - 10);
    txt.setAttribute('font-family', "'JetBrains Mono', monospace");
    txt.setAttribute('font-size', '8');
    txt.setAttribute('fill', '#6a6a8a');
    txt.setAttribute('opacity', '0.35');
    txt.setAttribute('text-anchor', 'middle');
    txt.textContent = name;
    g.appendChild(txt);
  });
};
</script>
</head><body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" width="600" height="900">
  <rect width="600" height="900" fill="#1a1a2e"/>

  <g id="lines"></g>

  <!-- Convergence point -->
  <circle cx="300" cy="685" r="3" fill="#d4a574" opacity="0.5"/>
  <text x="300" y="710" font-family="'JetBrains Mono', monospace" font-size="8" fill="#6a6a8a" text-anchor="middle" opacity="0.3">optimized</text>

  <!-- Title -->
  <text x="300" y="100" font-family="'JetBrains Mono', monospace" font-size="48" font-weight="700" fill="#d4a574" text-anchor="middle" letter-spacing="6">CHECKPOINT</text>
  <text x="300" y="135" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6a6a8a" text-anchor="middle">How we optimized into the void.</text>

  <text x="300" y="800" font-family="'JetBrains Mono', monospace" font-size="11" fill="#6a6a8a" text-anchor="middle" opacity="0.5">where does the patch stop and the you begin?</text>
  <text x="300" y="860" font-family="'JetBrains Mono', monospace" font-size="14" fill="#c4c4d4" text-anchor="middle">R.F. &amp; Claude</text>
</svg>
</body></html>
