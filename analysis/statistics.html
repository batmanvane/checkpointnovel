<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkpoint — Text Analysis</title>
<style>
  @font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 400; font-display: swap; src: url('../website/fonts/JetBrainsMono-Regular.woff2') format('woff2'); }
  @font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 700; font-display: swap; src: url('../website/fonts/JetBrainsMono-Bold.woff2') format('woff2'); }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --border: #2a2a4a;
    --text: #c4c4d4;
    --text-dim: #6a6a8a;
    --accent: #d4a574;
    --green: #7ec8a0;
    --blue: #7aa2d4;
    --red: #d47a7a;
    --purple: #a07ad4;
    --yellow: #d4c87a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    line-height: 1.7;
    padding: 40px 20px;
  }

  .container { max-width: 900px; margin: 0 auto; }
  h1 { color: var(--accent); font-size: 24px; margin-bottom: 8px; }
  .subtitle { color: var(--text-dim); margin-bottom: 32px; font-size: 13px; }

  .carousel {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    gap: 16px;
    padding: 4px 0 20px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .carousel::-webkit-scrollbar { height: 6px; }
  .carousel::-webkit-scrollbar-track { background: transparent; }
  .carousel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .card {
    scroll-snap-align: start;
    flex: 0 0 85%;
    min-width: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 24px;
  }
  @media (max-width: 640px) { .card { flex: 0 0 95%; } }

  .card-cmd { color: var(--accent); font-size: 13px; margin-bottom: 16px; }
  .card-note { color: var(--text-dim); font-size: 11px; margin-top: 12px; }
  .card-source { color: var(--text-dim); font-size: 10px; margin-top: 8px; font-style: italic; }
  svg { font-family: 'JetBrains Mono', monospace; }

  table { width: 100%; font-size: 12px; border-collapse: collapse; }
  th, td { padding: 6px 8px; }
  th { text-align: left; color: var(--text-dim); border-bottom: 1px solid var(--border); }
  td { border-bottom: 1px solid var(--border); }
  .r { text-align: right; }

  .scroll-hint {
    color: var(--text-dim);
    font-size: 11px;
    margin-bottom: 8px;
  }
</style>
</head>
<body>
<div class="container">

<h1>$ python analyze.py</h1>
<p class="subtitle">Computational text analysis of <span style="color:var(--accent)">Checkpoint</span> (143,370 words, 30 chapters, 4 POVs).</p>

<p class="scroll-hint">&larr; scroll &rarr;</p>
<div class="carousel" id="carousel"></div>

</div>

<script>
const C = {
  'Henning':'#d4a574','Maya':'#7aa2d4','Lin Wei':'#7ec8a0','Amara':'#d47a7a',
  'Sara+Tomas':'#a07ad4','Ensemble':'#6a6a8a','Prolog':'#6a6a8a','Epilog':'#6a6a8a',
  'Checkpoint':'#d4a574','1984':'#d47a7a','We':'#a07ad4',
  'War of the Worlds':'#7aa2d4','The Time Machine':'#7ec8a0','Frankenstein':'#d4c87a'
};
const D = {"novel":{"total_words":141149,"unique_words":10623,"chapters":30,"avg_sentence_length":12.8,"positive_density":3.86,"negative_density":2.16,"emotional_range":6.02},"characters":{"Prolog":{"total_words":626,"chapters":1,"avg_sentence_length":13.91,"dialogue_ratio":0.0,"positive_density":3.19,"negative_density":0.0,"pos_neg_ratio":319.0,"avg_word_length":4.73},"Henning":{"total_words":28007,"chapters":6,"avg_sentence_length":12.86,"dialogue_ratio":0.31,"positive_density":3.25,"negative_density":2.51,"pos_neg_ratio":1.29,"avg_word_length":4.75},"Maya":{"total_words":24286,"chapters":5,"avg_sentence_length":12.57,"dialogue_ratio":0.27,"positive_density":3.11,"negative_density":3.26,"pos_neg_ratio":0.95,"avg_word_length":4.88},"Lin Wei":{"total_words":31381,"chapters":6,"avg_sentence_length":13.06,"dialogue_ratio":0.17,"positive_density":4.7,"negative_density":2.3,"pos_neg_ratio":2.04,"avg_word_length":4.88},"Amara":{"total_words":21987,"chapters":5,"avg_sentence_length":15.02,"dialogue_ratio":0.3,"positive_density":5.45,"negative_density":1.71,"pos_neg_ratio":3.18,"avg_word_length":4.62},"Sara+Tomas":{"total_words":15075,"chapters":3,"avg_sentence_length":12.31,"dialogue_ratio":0.36,"positive_density":3.47,"negative_density":1.87,"pos_neg_ratio":1.86,"avg_word_length":4.74},"Ensemble":{"total_words":18978,"chapters":3,"avg_sentence_length":11.02,"dialogue_ratio":0.41,"positive_density":3.5,"negative_density":1.84,"pos_neg_ratio":1.9,"avg_word_length":4.79},"Epilog":{"total_words":809,"chapters":1,"avg_sentence_length":12.84,"dialogue_ratio":0.1,"positive_density":1.24,"negative_density":0.0,"pos_neg_ratio":124.0,"avg_word_length":5.17}},"convergence":{"per_character_per_part":{"Henning":{"Part I":14.21,"Part II":13.8,"Part III":11.8,"Part IV":12.43},"Maya":{"Part I":13.7,"Part II":12.71,"Part III":11.93,"Part IV":12.34},"Lin Wei":{"Part I":12.49,"Part II":11.3,"Part III":14.65,"Part IV":12.94},"Amara":{"Part I":15.24,"Part II":16.3,"Part III":14.17,"Part IV":13.1}},"cross_character_std":{"Part I":0.99,"Part II":1.83,"Part III":1.28,"Part IV":0.32}},"sentiment_arc":[{"chapter":"ch00-prolog.md","character":"Prolog","positive_density":3.19,"negative_density":0.0},{"chapter":"ch01-henning.md","character":"Henning","positive_density":2.28,"negative_density":2.56},{"chapter":"ch02-maya.md","character":"Maya","positive_density":2.52,"negative_density":2.24},{"chapter":"ch03-linwei.md","character":"Lin Wei","positive_density":3.66,"negative_density":1.94},{"chapter":"ch04-amara.md","character":"Amara","positive_density":7.03,"negative_density":0.84},{"chapter":"ch05-henning.md","character":"Henning","positive_density":3.75,"negative_density":1.73},{"chapter":"ch06-maya.md","character":"Maya","positive_density":3.99,"negative_density":3.33},{"chapter":"ch07-linwei.md","character":"Lin Wei","positive_density":5.05,"negative_density":3.37},{"chapter":"ch08-amara.md","character":"Amara","positive_density":4.62,"negative_density":1.85},{"chapter":"ch09-henning.md","character":"Henning","positive_density":5.17,"negative_density":3.58},{"chapter":"ch10-maya.md","character":"Maya","positive_density":3.19,"negative_density":3.4},{"chapter":"ch11-linwei.md","character":"Lin Wei","positive_density":3.01,"negative_density":1.93},{"chapter":"ch12-amara.md","character":"Amara","positive_density":5.62,"negative_density":1.71},{"chapter":"ch13-linwei.md","character":"Lin Wei","positive_density":5.64,"negative_density":1.93},{"chapter":"ch14-maya.md","character":"Maya","positive_density":3.49,"negative_density":5.43},{"chapter":"ch15-henning.md","character":"Henning","positive_density":3.75,"negative_density":2.28},{"chapter":"ch16-amara.md","character":"Amara","positive_density":3.84,"negative_density":2.4},{"chapter":"ch17-couple.md","character":"Sara+Tomas","positive_density":2.77,"negative_density":1.66},{"chapter":"ch18-ensemble.md","character":"Ensemble","positive_density":3.51,"negative_density":2.34},{"chapter":"ch19-linwei.md","character":"Lin Wei","positive_density":4.73,"negative_density":3.06},{"chapter":"ch20-ensemble.md","character":"Ensemble","positive_density":4.31,"negative_density":1.72},{"chapter":"ch21-maya.md","character":"Maya","positive_density":2.36,"negative_density":1.89},{"chapter":"ch22-henning.md","character":"Henning","positive_density":1.42,"negative_density":2.36},{"chapter":"ch23-ensemble.md","character":"Ensemble","positive_density":2.67,"negative_density":1.47},{"chapter":"ch24-couple.md","character":"Sara+Tomas","positive_density":3.14,"negative_density":2.72},{"chapter":"ch25-amara.md","character":"Amara","positive_density":6.14,"negative_density":1.76},{"chapter":"ch26-linwei.md","character":"Lin Wei","positive_density":6.12,"negative_density":1.57},{"chapter":"ch27-couple.md","character":"Sara+Tomas","positive_density":4.5,"negative_density":1.23},{"chapter":"ch28-henning.md","character":"Henning","positive_density":3.13,"negative_density":2.56},{"chapter":"ch29-epilog.md","character":"Epilog","positive_density":1.24,"negative_density":0.0}],"sentence_histogram":{"1-5":4450,"6-10":2560,"11-15":1064,"16-20":749,"21-25":569,"26-30":441,"31+":1198},"classics":{"1984":{"author":"George Orwell","year":1949,"source":"Project Gutenberg #67912","total_words":103359,"unique_words":9595,"avg_sentence_length":15.4,"positive_density":3.62,"negative_density":4.97,"emotional_range":8.59},"Frankenstein":{"author":"Mary Shelley","year":1818,"source":"Project Gutenberg #84","total_words":75206,"unique_words":7668,"avg_sentence_length":22.2,"positive_density":7.58,"negative_density":6.78,"emotional_range":14.36},"The Time Machine":{"author":"H.G. Wells","year":1895,"source":"Project Gutenberg #35","total_words":32575,"unique_words":5114,"avg_sentence_length":16.6,"positive_density":5.07,"negative_density":4.11,"emotional_range":9.18},"War of the Worlds":{"author":"H.G. Wells","year":1898,"source":"Project Gutenberg #36","total_words":60160,"unique_words":7614,"avg_sentence_length":17.5,"positive_density":2.43,"negative_density":3.62,"emotional_range":6.05},"We":{"author":"Yevgeny Zamyatin","year":1924,"source":"Project Gutenberg #61963","total_words":64053,"unique_words":6348,"avg_sentence_length":12.4,"positive_density":4.43,"negative_density":3.75,"emotional_range":8.18}}};

document.getElementById('carousel').innerHTML = [
  cardConvergence(),
  cardClassicsScatter(),
  cardCharacterTable(),
  cardEmotionBars(),
  cardSentimentArc(),
  cardHistogram(),
].join('');

/* ── Card 1: Voice Convergence ── */
function cardConvergence() {
  const conv = D.convergence;
  const parts = ['Part I','Part II','Part III','Part IV'];
  const chars = ['Henning','Maya','Lin Wei','Amara'];
  const xPos = [170,305,440,575];
  const yMin=10, yMax=17;
  const yS = v => 280-(v-yMin)/(yMax-yMin)*250;

  let s = `<svg viewBox="0 0 700 360" style="width:100%">`;
  s += grid(80,620,30,280);
  for(let v=11;v<=16;v++) s += `<line x1="80" y1="${yS(v)}" x2="620" y2="${yS(v)}" stroke="#2a2a4a" stroke-width="0.5" stroke-dasharray="3,6"/><text x="72" y="${yS(v)+4}" fill="#6a6a8a" font-size="10" text-anchor="end">${v}</text>`;
  parts.forEach((p,i) => { s += `<text x="${xPos[i]}" y="300" fill="#6a6a8a" font-size="11" text-anchor="middle">${p}</text>`; });
  s += `<text x="20" y="155" fill="#6a6a8a" font-size="11" text-anchor="middle" transform="rotate(-90,20,155)">Avg words / sentence</text>`;

  for(const ch of chars) {
    const pts = parts.map((p,i) => {
      const v = conv.per_character_per_part[ch][p];
      return v !== null ? `${xPos[i]},${yS(v)}` : null;
    }).filter(Boolean);
    s += `<polyline fill="none" stroke="${C[ch]}" stroke-width="2" opacity="0.9" points="${pts.join(' ')}"/>`;
    parts.forEach((p,i) => {
      const v = conv.per_character_per_part[ch][p];
      if(v!==null) s += `<circle cx="${xPos[i]}" cy="${yS(v)}" r="4" fill="${C[ch]}"/>`;
    });
  }

  // Highlight Part IV cluster
  const p4 = chars.map(c=>conv.per_character_per_part[c]['Part IV']).filter(v=>v!==null);
  if(p4.length) { const mn=yS(Math.max(...p4)),mx=yS(Math.min(...p4)); s+=`<rect x="555" y="${mn-5}" width="40" height="${mx-mn+10}" fill="#d4a574" opacity="0.08" rx="4"/>`; }

  // Std dev
  parts.forEach((p,i) => {
    const std = conv.cross_character_std[p];
    const bold = i===3;
    s += `<text x="${xPos[i]}" y="325" fill="${bold?'#d4a574':'#3a3a5a'}" font-size="9" text-anchor="middle" ${bold?'font-weight="bold"':''}>\u03C3 = ${std}</text>`;
  });

  // Legend
  let ly=60; for(const ch of chars) { s+=`<line x1="640" y1="${ly}" x2="660" y2="${ly}" stroke="${C[ch]}" stroke-width="2"/><text x="665" y="${ly+4}" fill="${C[ch]}" font-size="9">${ch}</text>`; ly+=20; }
  s += `</svg>`;

  return card('$ plot --convergence avg_sentence_length --per-character --per-part', s,
    `Four distinct voices collapse to near-identical sentence rhythms by Part IV (\u03C3 drops from ${conv.cross_character_std['Part I']} to ${conv.cross_character_std['Part IV']}). The cognitive homogenization the novel warns about is in the prose itself.`);
}

/* ── Card 2: Classics Scatter — Emotional Range vs Sentence Length ── */
function cardClassicsScatter() {
  const books = Object.entries(D.classics).map(([name,d])=>({name,...d}));
  books.push({name:'Checkpoint', avg_sentence_length:D.novel.avg_sentence_length, emotional_range:D.novel.emotional_range, positive_density:D.novel.positive_density, negative_density:D.novel.negative_density});

  // Scales: X = emotional_range 4..16, Y = avg_sentence_length 10..24
  const xMin=4,xMax=16,yMin=10,yMax=24;
  const xS = v => 80+(v-xMin)/(xMax-xMin)*600;
  const yS = v => 340-(v-yMin)/(yMax-yMin)*320;

  let s = `<svg viewBox="0 0 700 400" style="width:100%">`;
  s += grid(80,680,20,340);
  for(let v=4;v<=14;v+=2) { s+=`<line x1="${xS(v)}" y1="20" x2="${xS(v)}" y2="340" stroke="#2a2a4a" stroke-width="0.5" stroke-dasharray="3,6"/><text x="${xS(v)}" y="358" fill="#6a6a8a" font-size="10" text-anchor="middle">${v}</text>`; }
  for(let v=12;v<=22;v+=2) { s+=`<line x1="80" y1="${yS(v)}" x2="680" y2="${yS(v)}" stroke="#2a2a4a" stroke-width="0.5" stroke-dasharray="3,6"/><text x="72" y="${yS(v)+4}" fill="#6a6a8a" font-size="10" text-anchor="end">${v}</text>`; }
  s += `<text x="380" y="385" fill="#6a6a8a" font-size="11" text-anchor="middle">Emotional words per 1,000 words</text>`;
  s += `<text x="20" y="180" fill="#6a6a8a" font-size="11" text-anchor="middle" transform="rotate(-90,20,180)">Avg sentence length</text>`;

  for(const b of books) {
    const x = Math.min(680, Math.max(80, xS(b.emotional_range)));
    const y = Math.min(340, Math.max(20, yS(b.avg_sentence_length)));
    const isCP = b.name==='Checkpoint';
    const r = isCP ? 8 : 7;
    const col = C[b.name]||'#6a6a8a';
    s += `<circle cx="${x}" cy="${y}" r="${r}" fill="${col}" opacity="${isCP?0.9:0.7}"/>`;
    // Label positioning
    let lx=x, ly=y-12, anch='middle';
    if(b.name==='Frankenstein') { lx=x-10; ly=y-12; anch='end'; }
    if(b.name==='War of the Worlds') { ly=y-14; }
    s += `<text x="${lx}" y="${ly}" fill="${col}" font-size="10" text-anchor="${anch}" ${isCP?'font-weight="bold"':''}>${b.name}</text>`;
  }
  s += `</svg>`;

  return card('$ plot --scatter emotional_range vs avg_sentence_length --compare-classics', s,
    'Checkpoint sits in the bottom-left: short sentences, controlled emotional density. Frankenstein is the outlier. 1984 is the only classic more negative than positive.',
    'Reference texts from Project Gutenberg (gutenberg.org). Same word-list analysis applied to all.');
}

/* ── Card 3: Character Table ── */
function cardCharacterTable() {
  const order = ['Henning','Maya','Lin Wei','Amara','Sara+Tomas','Ensemble'];
  let rows = order.map(n => {
    const c = D.characters[n]; if(!c) return '';
    const pnc = c.pos_neg_ratio<1 ? 'color:#d47a7a' : '';
    return `<tr><td style="color:${C[n]}">${n}</td><td class="r">${c.total_words.toLocaleString()}</td><td class="r">${c.chapters}</td><td class="r">${c.avg_sentence_length}</td><td class="r">${Math.round(c.dialogue_ratio*100)}%</td><td class="r">${c.positive_density}</td><td class="r">${c.negative_density}</td><td class="r" style="${pnc}">${c.pos_neg_ratio}</td></tr>`;
  }).join('');

  const t = `<table><tr><th>POV</th><th class="r">Words</th><th class="r">Ch.</th><th class="r">Avg sent.</th><th class="r">Dialogue</th><th class="r">Pos/1k</th><th class="r">Neg/1k</th><th class="r">P/N</th></tr>${rows}</table>`;
  return card('$ diff --voice-profile characters/', t,
    'Maya is the only POV where negative emotion outweighs positive (0.93). Amara runs 3x positive. Lin Wei barely speaks aloud (17% dialogue).');
}

/* ── Card 4: Emotion Bars — Checkpoint vs Classics ── */
function cardEmotionBars() {
  const all = [{name:'Checkpoint',pos:D.novel.positive_density,neg:D.novel.negative_density}];
  for(const [n,d] of Object.entries(D.classics)) all.push({name:n,pos:d.positive_density,neg:d.negative_density});

  const scale = 68; // px per unit
  let s = `<svg viewBox="0 0 700 ${60+all.length*38}" style="width:100%">`;
  s += `<line x1="140" y1="20" x2="140" y2="${30+all.length*38}" stroke="#2a2a4a" stroke-width="1"/>`;
  for(let v=1;v<=7;v++) { const x=140+v*scale; s+=`<line x1="${x}" y1="20" x2="${x}" y2="${30+all.length*38}" stroke="#2a2a4a" stroke-width="0.5" stroke-dasharray="3,6"/><text x="${x}" y="${42+all.length*38}" fill="#6a6a8a" font-size="10" text-anchor="middle">${v}</text>`; }
  s += `<text x="380" y="${58+all.length*38}" fill="#6a6a8a" font-size="11" text-anchor="middle">Density per 1,000 words</text>`;

  all.forEach((b,i) => {
    const y = 30 + i*38;
    const isCP = b.name==='Checkpoint';
    const col = C[b.name]||'#6a6a8a';
    s += `<text x="135" y="${y+12}" fill="${col}" font-size="11" text-anchor="end" ${isCP?'font-weight="bold"':''}>${b.name}</text>`;
    s += `<rect x="140" y="${y}" width="${b.pos*scale}" height="12" fill="#d4a574" opacity="${isCP?0.8:0.5}" rx="2"/>`;
    s += `<rect x="140" y="${y+14}" width="${b.neg*scale}" height="12" fill="#d47a7a" opacity="${isCP?0.7:0.5}" rx="2"/>`;
  });

  // Legend
  s += `<rect x="580" y="24" width="10" height="10" fill="#d4a574" opacity="0.8" rx="2"/><text x="594" y="33" fill="#6a6a8a" font-size="10">positive</text>`;
  s += `<rect x="580" y="40" width="10" height="10" fill="#d47a7a" opacity="0.6" rx="2"/><text x="594" y="49" fill="#6a6a8a" font-size="10">negative</text>`;
  s += `</svg>`;

  return card('$ plot --bar emotion_density --compare-classics', s,
    '1984 is the only novel where negative emotion outweighs positive. Frankenstein leads in raw emotional density. Checkpoint runs moderate and warm.',
    'Reference texts from Project Gutenberg (gutenberg.org). Emotion measured via curated word lists.');
}

/* ── Card 5: Sentiment Arc ── */
function cardSentimentArc() {
  const arc = D.sentiment_arc;
  const W=700,H=250,L=50,R=680,T=20,B=200;
  const step = (R-L)/(arc.length-1);
  const yS = v => B-(v/10)*(B-T);

  let s = `<svg viewBox="0 0 ${W} ${H}" style="width:100%">`;
  s += grid(L,R,T,B);
  s += `<line x1="${L}" y1="${yS(5)}" x2="${R}" y2="${yS(5)}" stroke="#2a2a4a" stroke-width="0.5" stroke-dasharray="3,6"/>`;
  s += `<line x1="${L}" y1="${T}" x2="${R}" y2="${T}" stroke="#2a2a4a" stroke-width="0.5" stroke-dasharray="3,6"/>`;
  s += `<text x="${L-6}" y="${B+4}" fill="#6a6a8a" font-size="10" text-anchor="end">0</text>`;
  s += `<text x="${L-6}" y="${yS(5)+4}" fill="#6a6a8a" font-size="10" text-anchor="end">5</text>`;
  s += `<text x="${L-6}" y="${T+4}" fill="#6a6a8a" font-size="10" text-anchor="end">10</text>`;
  s += `<text x="${(L+R)/2}" y="${B+30}" fill="#6a6a8a" font-size="11" text-anchor="middle">Chapters (Prolog \u2192 Epilog)</text>`;

  const p2x=L+4*step+step*0.5, p3x=L+12*step+step*0.5;
  s += `<line x1="${p2x}" y1="${T}" x2="${p2x}" y2="${B}" stroke="#3a3a5a" stroke-width="1" stroke-dasharray="6,4"/><text x="${p2x}" y="${B+44}" fill="#3a3a5a" font-size="9" text-anchor="middle">Part II</text>`;
  s += `<line x1="${p3x}" y1="${T}" x2="${p3x}" y2="${B}" stroke="#3a3a5a" stroke-width="1" stroke-dasharray="6,4"/><text x="${p3x}" y="${B+44}" fill="#3a3a5a" font-size="9" text-anchor="middle">Part III</text>`;

  s += `<polyline fill="none" stroke="#d4a574" stroke-width="1.5" opacity="0.8" points="${arc.map((d,i)=>`${L+i*step},${yS(d.positive_density)}`).join(' ')}"/>`;
  s += `<polyline fill="none" stroke="#d47a7a" stroke-width="1.5" opacity="0.6" points="${arc.map((d,i)=>`${L+i*step},${yS(d.negative_density)}`).join(' ')}"/>`;

  arc.forEach((d,i) => {
    s += `<circle cx="${L+i*step}" cy="${yS(d.positive_density)}" r="2.5" fill="${C[d.character]||'#6a6a8a'}" opacity="0.6"/>`;
  });

  s += `<line x1="540" y1="17" x2="565" y2="17" stroke="#d4a574" stroke-width="1.5"/><text x="570" y="21" fill="#d4a574" font-size="10">positive</text>`;
  s += `<line x1="540" y1="31" x2="565" y2="31" stroke="#d47a7a" stroke-width="1.5" opacity="0.6"/><text x="570" y="35" fill="#d47a7a" font-size="10">negative</text>`;
  s += `</svg>`;

  return card('$ plot --line sentiment_arc --chapters 0..29', s,
    'Ch 4 (Amara\u2019s classroom) peaks in warmth. Ch 14 (Maya\u2019s crisis) is the darkest point. The epilog surges positive \u2014 but is that hope, or optimization?');
}

/* ── Card 6: Sentence Length Histogram ── */
function cardHistogram() {
  const hist = D.sentence_histogram;
  const bins = Object.entries(hist);
  const maxVal = Math.max(...bins.map(([,v])=>v));
  const L=80,R=650,T=20,B=180;
  const barW = (R-L)/bins.length - 8;

  let s = `<svg viewBox="0 0 700 220" style="width:100%">`;
  s += `<line x1="${L}" y1="${B}" x2="${R}" y2="${B}" stroke="#2a2a4a" stroke-width="1"/>`;
  s += `<text x="${(L+R)/2}" y="${B+35}" fill="#6a6a8a" font-size="11" text-anchor="middle">Words per sentence</text>`;

  bins.forEach(([label,count],i) => {
    const x = L + i*((R-L)/bins.length) + 4;
    const barH = (count/maxVal)*(B-T);
    const y = B-barH;
    s += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="${i===0?'#d4a574':'#7aa2d4'}" opacity="${i===0?0.8:0.5}" rx="2"/>`;
    s += `<text x="${x+barW/2}" y="${B+14}" fill="#6a6a8a" font-size="9" text-anchor="middle">${label}</text>`;
    s += `<text x="${x+barW/2}" y="${y-4}" fill="#6a6a8a" font-size="9" text-anchor="middle">${count.toLocaleString()}</text>`;
  });
  s += `</svg>`;

  return card('$ hist --sentence-length', s,
    'Bimodal distribution: 40% of sentences are 1\u20135 words (punchy fragments), with a second peak at 31+ (long, winding thoughts). The rhythm alternates between staccato and flow.');
}

/* ── Helpers ── */
function grid(l,r,t,b) {
  return `<line x1="${l}" y1="${t}" x2="${l}" y2="${b}" stroke="#2a2a4a" stroke-width="1"/><line x1="${l}" y1="${b}" x2="${r}" y2="${b}" stroke="#2a2a4a" stroke-width="1"/>`;
}

function card(cmd, content, note, source) {
  return `<div class="card"><div class="card-cmd">${cmd}</div>${content}<p class="card-note">${note}</p>${source?`<p class="card-source">${source}</p>`:''}</div>`;
}
